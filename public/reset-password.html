<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Passwort zurücksetzen - Gym Tracker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="auth-screen">
        <div class="auth-container">
            <div class="auth-header">
                <h1>Passwort zurücksetzen</h1>
                <p>Gib dein neues Passwort ein.</p>
            </div>
            
            <form id="reset-form" class="auth-form">
                <div class="form-group">
                    <label for="new-password">Neues Passwort</label>
                    <input type="password" id="new-password" required minlength="6">
                </div>
                
                <div class="form-group">
                    <label for="confirm-password">Passwort bestätigen</label>
                    <input type="password" id="confirm-password" required minlength="6">
                </div>
                
                <button type="submit" class="btn-primary">Passwort zurücksetzen</button>
            </form>
            
            <div class="auth-links">
                <a href="/">Zurück zur Anmeldung</a>
            </div>
            
            <div id="message" style="display: none; margin-top: 20px; padding: 15px; border-radius: 8px;"></div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            
            if (!token) {
                showMessage('error', 'Ungültiger oder fehlender Token');
                return;
            }

            document.getElementById('reset-form').addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const password = document.getElementById('new-password').value;
                const confirmPassword = document.getElementById('confirm-password').value;
                
                if (password !== confirmPassword) {
                    showMessage('error', 'Passwörter stimmen nicht überein');
                    return;
                }
                
                if (password.length < 6) {
                    showMessage('error', 'Passwort muss mindestens 6 Zeichen lang sein');
                    return;
                }
                
                try {
                    const response = await fetch('/api/reset-password', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            token: token,
                            password: password
                        })
                    });
                    
                    const data = await response.json();
                    
                    if (response.ok) {
                        showMessage('success', 'Passwort erfolgreich zurückgesetzt! Du kannst dich jetzt anmelden.');
                        setTimeout(() => {
                            window.location.href = '/';
                        }, 3000);
                    } else {
                        showMessage('error', data.error || 'Fehler beim Zurücksetzen des Passworts');
                    }
                } catch (error) {
                    showMessage('error', 'Fehler beim Zurücksetzen des Passworts');
                }
            });
        });

        function showMessage(type, text) {
            const messageDiv = document.getElementById('message');
            messageDiv.style.display = 'block';
            messageDiv.className = type === 'success' ? 'success-message' : 'error-message';
            messageDiv.textContent = text;
            
            if (type === 'success') {
                messageDiv.style.backgroundColor = '#10b981';
                messageDiv.style.color = 'white';
            } else {
                messageDiv.style.backgroundColor = '#ef4444';
                messageDiv.style.color = 'white';
            }
        }
    </script>
</body>
</html>
